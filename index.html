<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Quest Tracker</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #1e293b;
            --color-bg-surface: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-accent: #38bdf8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-purple: #a78bfa;
            --color-gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--color-bg-elevated);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-accent);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .level-bar {
            background: var(--color-bg-surface);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .level-progress {
            background: linear-gradient(90deg, var(--color-accent), var(--color-purple));
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--color-bg-elevated);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 1.3rem;
            color: var(--color-accent);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: var(--color-bg-surface);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: var(--color-accent);
            color: var(--color-bg-base);
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-header {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            color: var(--color-accent);
            font-size: 0.85rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            background: var(--color-bg-surface);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
            padding: 5px;
        }

        .calendar-day:hover {
            border-color: var(--color-accent);
        }

        .calendar-day.has-entry {
            background: linear-gradient(135deg, var(--color-bg-surface), var(--color-accent));
        }

        .calendar-day.today {
            border-color: var(--color-gold);
        }

        .calendar-day.review-due {
            border-color: var(--color-warning);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .day-number {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .day-dots {
            display: flex;
            gap: 2px;
        }

        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--color-success);
        }

        .entries-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entry-item {
            background: var(--color-bg-surface);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--color-accent);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .entry-title {
            font-weight: bold;
            color: var(--color-text-primary);
        }

        .entry-date {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .entry-content {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        .entry-footer {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .badge-new { background: var(--color-success); color: white; }
        .badge-review { background: var(--color-warning); color: white; }
        .badge-mastered { background: var(--color-purple); color: white; }

        .review-btn {
            background: var(--color-success);
            color: white;
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .achievements {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .achievement {
            text-align: center;
            padding: 10px;
            background: var(--color-bg-surface);
            border-radius: 8px;
            opacity: 0.4;
            transition: all 0.3s;
        }

        .achievement.unlocked {
            opacity: 1;
            border: 2px solid var(--color-gold);
        }

        .achievement-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .achievement-name {
            font-size: 0.7rem;
            color: var(--color-text-secondary);
        }

        .streak-flame {
            display: inline-block;
            font-size: 1.5rem;
            animation: flicker 1.5s infinite;
        }

        @keyframes flicker {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--color-bg-elevated);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-secondary);
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Study Quest Tracker</h1>
            <p style="color: var(--color-text-secondary);">Level up your learning with spaced repetition</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">Level <span id="userLevel">1</span></div>
                <div class="level-bar">
                    <div class="level-progress" id="levelProgress" style="width: 0%;">
                        <span id="xpDisplay">0/100 XP</span>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span class="streak-flame">🔥</span> <span id="streakCount">0</span></div>
                <div class="stat-label">Day Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalEntries">0</div>
                <div class="stat-label">Total Entries</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="reviewsDue">0</div>
                <div class="stat-label">Reviews Due</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>📝 Add New Entry</h2>
                <form id="entryForm">
                    <div class="form-group">
                        <label for="entryTitle">Topic/Title</label>
                        <input type="text" id="entryTitle" placeholder="e.g., Ectopic pregnancy cases" required>
                    </div>
                    <div class="form-group">
                        <label for="entryContent">What did you learn?</label>
                        <textarea id="entryContent" placeholder="Key learnings, clinical pearls, important protocols..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="entryCategory">Category</label>
                        <select id="entryCategory">
                            <option value="clinical">Clinical Cases</option>
                            <option value="procedures">Procedures</option>
                            <option value="theory">Theory/Concepts</option>
                            <option value="guidelines">Guidelines</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <button type="submit">➕ Add Entry (+10 XP)</button>
                </form>
            </div>

            <div class="card">
                <h2>📅 Study Calendar</h2>
                <div class="calendar" id="calendar"></div>
            </div>
        </div>

        <div class="card">
            <h2>📚 Today's Reviews & Recent Entries</h2>
            <div class="entries-list" id="entriesList"></div>
        </div>

        <div class="card">
            <h2>🏆 Achievements</h2>
            <div class="achievements" id="achievements"></div>
        </div>
    </div>

    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 style="color: var(--color-accent); margin-bottom: 20px;">Review Session</h2>
            <div id="reviewContent"></div>
        </div>
    </div>

    <script>
        // Data structure
        let userData = {
            entries: [],
            xp: 0,
            level: 1,
            streak: 0,
            lastStudyDate: null,
            achievements: []
        };

        const ACHIEVEMENTS = [
            { id: 'first_entry', icon: '🌱', name: 'First Step', requirement: e => e.length >= 1 },
            { id: 'week_warrior', icon: '⚔️', name: 'Week Warrior', requirement: (e, s) => s >= 7 },
            { id: 'ten_entries', icon: '📚', name: 'Scholar', requirement: e => e.length >= 10 },
            { id: 'month_master', icon: '🎓', name: 'Month Master', requirement: (e, s) => s >= 30 },
            { id: 'fifty_entries', icon: '🔬', name: 'Researcher', requirement: e => e.length >= 50 },
            { id: 'level_five', icon: '⭐', name: 'Rising Star', requirement: (e, s, l) => l >= 5 },
            { id: 'perfect_week', icon: '💯', name: 'Perfect Week', requirement: e => e.length >= 7 },
            { id: 'reviewer', icon: '🔄', name: 'Diligent', requirement: e => e.filter(x => x.reviewCount > 0).length >= 5 }
        ];

        // Initialize app
        function init() {
            renderCalendar();
            renderEntries();
            updateStats();
            renderAchievements();
            checkStreak();
            
            document.getElementById('entryForm').addEventListener('submit', handleAddEntry);
            document.getElementById('closeModal').addEventListener('click', closeReviewModal);
        }

        // Spaced repetition intervals: 1, 3, 7, 14, 30 days
        function getNextReviewDate(reviewCount) {
            const intervals = [1, 3, 7, 14, 30];
            const days = intervals[Math.min(reviewCount, intervals.length - 1)];
            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + days);
            return nextDate.toISOString().split('T')[0];
        }

        function handleAddEntry(e) {
            e.preventDefault();
            
            const entry = {
                id: Date.now(),
                title: document.getElementById('entryTitle').value,
                content: document.getElementById('entryContent').value,
                category: document.getElementById('entryCategory').value,
                dateCreated: new Date().toISOString().split('T')[0],
                nextReview: getNextReviewDate(0),
                reviewCount: 0,
                lastReviewed: null
            };

            userData.entries.unshift(entry);
            addXP(10);
            updateLastStudyDate();
            
            e.target.reset();
            renderCalendar();
            renderEntries();
            updateStats();
            checkAchievements();
            
            showNotification('Entry added! +10 XP 🎉');
        }

        function addXP(amount) {
            userData.xp += amount;
            
            // Level up logic
            const xpForNextLevel = userData.level * 100;
            if (userData.xp >= xpForNextLevel) {
                userData.xp -= xpForNextLevel;
                userData.level++;
                showNotification(`🎊 Level Up! You're now Level ${userData.level}!`);
            }
            
            updateStats();
        }

        function updateLastStudyDate() {
            const today = new Date().toISOString().split('T')[0];
            userData.lastStudyDate = today;
        }

        function checkStreak() {
            if (!userData.lastStudyDate) {
                userData.streak = 0;
                return;
            }
            
            const today = new Date();
            const lastStudy = new Date(userData.lastStudyDate);
            const diffDays = Math.floor((today - lastStudy) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                // Same day, keep streak
            } else if (diffDays === 1) {
                // Consecutive day
                userData.streak++;
            } else if (diffDays > 1) {
                // Streak broken
                userData.streak = 0;
            }
        }

        function updateStats() {
            document.getElementById('userLevel').textContent = userData.level;
            document.getElementById('streakCount').textContent = userData.streak;
            document.getElementById('totalEntries').textContent = userData.entries.length;
            
            const xpForNextLevel = userData.level * 100;
            const progressPercent = (userData.xp / xpForNextLevel) * 100;
            document.getElementById('levelProgress').style.width = progressPercent + '%';
            document.getElementById('xpDisplay').textContent = `${userData.xp}/${xpForNextLevel} XP`;
            
            // Count reviews due
            const today = new Date().toISOString().split('T')[0];
            const reviewsDue = userData.entries.filter(e => e.nextReview <= today && e.reviewCount < 5).length;
            document.getElementById('reviewsDue').textContent = reviewsDue;
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.textContent = day;
                calendar.appendChild(header);
            });
            
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            
            // Add empty cells for days before month starts
            for (let i = 0; i < firstDay.getDay(); i++) {
                const emptyCell = document.createElement('div');
                calendar.appendChild(emptyCell);
            }
            
            // Add days of month
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                
                const entriesOnDay = userData.entries.filter(e => e.dateCreated === dateStr);
                const reviewsOnDay = userData.entries.filter(e => e.nextReview === dateStr);
                
                if (entriesOnDay.length > 0) {
                    dayCell.classList.add('has-entry');
                }
                
                if (reviewsOnDay.length > 0) {
                    dayCell.classList.add('review-due');
                }
                
                if (day === today.getDate()) {
                    dayCell.classList.add('today');
                }
                
                dayCell.innerHTML = `
                    <div class="day-number">${day}</div>
                    <div class="day-dots">
                        ${entriesOnDay.slice(0, 3).map(() => '<div class="dot"></div>').join('')}
                    </div>
                `;
                
                calendar.appendChild(dayCell);
            }
        }

        function renderEntries() {
            const list = document.getElementById('entriesList');
            const today = new Date().toISOString().split('T')[0];
            
            if (userData.entries.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--color-text-secondary);">No entries yet. Add your first learning!</p>';
                return;
            }
            
            list.innerHTML = userData.entries.map(entry => {
                const isReviewDue = entry.nextReview <= today && entry.reviewCount < 5;
                const badge = entry.reviewCount >= 5 ? 'mastered' : (isReviewDue ? 'review' : 'new');
                const badgeText = entry.reviewCount >= 5 ? 'Mastered' : (isReviewDue ? 'Review Due' : `Review ${entry.reviewCount}/5`);
                
                return `
                    <div class="entry-item">
                        <div class="entry-header">
                            <div class="entry-title">${entry.title}</div>
                            <div class="entry-date">${entry.dateCreated}</div>
                        </div>
                        <div class="entry-content">${entry.content.substring(0, 100)}${entry.content.length > 100 ? '...' : ''}</div>
                        <div class="entry-footer">
                            <span class="badge badge-${badge}">${badgeText}</span>
                            ${isReviewDue ? `<button class="review-btn" onclick="reviewEntry(${entry.id})">Review Now (+5 XP)</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function reviewEntry(entryId) {
            const entry = userData.entries.find(e => e.id === entryId);
            if (!entry) return;
            
            const modal = document.getElementById('reviewModal');
            const content = document.getElementById('reviewContent');
            
            content.innerHTML = `
                <h3 style="margin-bottom: 15px;">${entry.title}</h3>
                <p style="color: var(--color-text-secondary); margin-bottom: 20px;">${entry.content}</p>
                <p style="font-size: 0.9rem; color: var(--color-text-secondary); margin-bottom: 20px;">
                    <strong>Category:</strong> ${entry.category}<br>
                    <strong>Created:</strong> ${entry.dateCreated}<br>
                    <strong>Review Count:</strong> ${entry.reviewCount}/5
                </p>
                <div style="display: flex; gap: 10px;">
                    <button onclick="completeReview(${entryId}, 'easy')" style="flex: 1; background: var(--color-success);">
                        ✅ Easy
                    </button>
                    <button onclick="completeReview(${entryId}, 'hard')" style="flex: 1; background: var(--color-warning);">
                        🔄 Hard
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function completeReview(entryId, difficulty) {
            const entry = userData.entries.find(e => e.id === entryId);
            if (!entry) return;
            
            entry.reviewCount++;
            entry.lastReviewed = new Date().toISOString().split('T')[0];
            
            // Adjust next review based on difficulty
            if (difficulty === 'hard') {
                const intervals = [1, 2, 4, 7, 14];
                const days = intervals[Math.min(entry.reviewCount - 1, intervals.length - 1)];
                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + days);
                entry.nextReview = nextDate.toISOString().split('T')[0];
            } else {
                entry.nextReview = getNextReviewDate(entry.reviewCount);
            }
            
            addXP(5);
            closeReviewModal();
            renderEntries();
            renderCalendar();
            checkAchievements();
            
            showNotification('Review completed! +5 XP 🎯');
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        function renderAchievements() {
            const container = document.getElementById('achievements');
            container.innerHTML = ACHIEVEMENTS.map(ach => {
                const unlocked = userData.achievements.includes(ach.id);
                return `
                    <div class="achievement ${unlocked ? 'unlocked' : ''}">
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-name">${ach.name}</div>
                    </div>
                `;
            }).join('');
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(ach => {
                if (!userData.achievements.includes(ach.id)) {
                    if (ach.requirement(userData.entries, userData.streak, userData.level)) {
                        userData.achievements.push(ach.id);
                        addXP(25);
                        showNotification(`🏆 Achievement Unlocked: ${ach.name}! +25 XP`);
                    }
                }
            });
            renderAchievements();
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: var(--color-accent);
                color: var(--color-bg-base);
                padding: 15px 20px;
                border-radius: 8px;
                font-weight: bold;
                z-index: 2000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
